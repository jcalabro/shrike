[package]
name = "ratproto-cbor-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.ratproto-cbor]
path = ".."

[workspace]
members = ["."]

[[bin]]
name = "fuzz_drisl_roundtrip"
path = "fuzz_targets/fuzz_drisl_roundtrip.rs"
doc = false

[[bin]]
name = "fuzz_cid_bytes"
path = "fuzz_targets/fuzz_cid_bytes.rs"
doc = false

[[bin]]
name = "fuzz_cid_string"
path = "fuzz_targets/fuzz_cid_string.rs"
doc = false

[[bin]]
name = "fuzz_varint"
path = "fuzz_targets/fuzz_varint.rs"
doc = false
