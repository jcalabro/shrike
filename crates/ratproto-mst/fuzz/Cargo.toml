[package]
name = "ratproto-mst-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.ratproto-mst]
path = ".."

[dependencies.ratproto-cbor]
path = "../../ratproto-cbor"

[workspace]
members = ["."]

[[bin]]
name = "fuzz_decode_node_data"
path = "fuzz_targets/fuzz_decode_node_data.rs"
doc = false

[[bin]]
name = "fuzz_node_data_roundtrip"
path = "fuzz_targets/fuzz_node_data_roundtrip.rs"
doc = false

[[bin]]
name = "fuzz_height_for_key"
path = "fuzz_targets/fuzz_height_for_key.rs"
doc = false

[[bin]]
name = "fuzz_tree_ops"
path = "fuzz_targets/fuzz_tree_ops.rs"
doc = false
