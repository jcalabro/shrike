[package]
name = "shrike-lexicon-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

[dependencies.shrike-lexicon]
path = ".."

[workspace]
members = ["."]

[[bin]]
name = "fuzz_parse_schema"
path = "fuzz_targets/fuzz_parse_schema.rs"
doc = false

[[bin]]
name = "fuzz_validate_record"
path = "fuzz_targets/fuzz_validate_record.rs"
doc = false
