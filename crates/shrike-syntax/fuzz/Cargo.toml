[package]
name = "shrike-syntax-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.shrike-syntax]
path = ".."

[workspace]
members = ["."]

[[bin]]
name = "fuzz_did"
path = "fuzz_targets/fuzz_did.rs"
doc = false

[[bin]]
name = "fuzz_handle"
path = "fuzz_targets/fuzz_handle.rs"
doc = false

[[bin]]
name = "fuzz_nsid"
path = "fuzz_targets/fuzz_nsid.rs"
doc = false

[[bin]]
name = "fuzz_aturi"
path = "fuzz_targets/fuzz_aturi.rs"
doc = false

[[bin]]
name = "fuzz_tid"
path = "fuzz_targets/fuzz_tid.rs"
doc = false

[[bin]]
name = "fuzz_datetime"
path = "fuzz_targets/fuzz_datetime.rs"
doc = false

[[bin]]
name = "fuzz_recordkey"
path = "fuzz_targets/fuzz_recordkey.rs"
doc = false

[[bin]]
name = "fuzz_language"
path = "fuzz_targets/fuzz_language.rs"
doc = false

[[bin]]
name = "fuzz_at_identifier"
path = "fuzz_targets/fuzz_at_identifier.rs"
doc = false
