[package]
name = "ratproto-crypto-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"

[dependencies.ratproto-crypto]
path = ".."

[workspace]
members = ["."]

[[bin]]
name = "fuzz_parse_did_key"
path = "fuzz_targets/fuzz_parse_did_key.rs"
doc = false

[[bin]]
name = "fuzz_p256_public_bytes"
path = "fuzz_targets/fuzz_p256_public_bytes.rs"
doc = false

[[bin]]
name = "fuzz_k256_public_bytes"
path = "fuzz_targets/fuzz_k256_public_bytes.rs"
doc = false
